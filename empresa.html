<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Empresa</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <a href="home.html">ZayaEdu</a>
        <input id="botao-menu" type="button" value="☰">
    </header>

    <div class="menu-lateral" id="menuLateral">
        <h2>Menu</h2>
        <ul>
            <li><a href="home.html">Início</a></li>
            <li><a href="empresa.html">Instituição</a></li>
            <li><a href="usuario.html">Usuários</a></li>
        </ul>
    </div>

    <main id="conteudoPrincipal">
        <h2>➠ Dados da Empresa</h2>
        <form action="#" method="post">
            <label for="nomeEmpresa">Nome</label>
            <input type="text" id="nomeEmpresa" name="nomeEmpresa" required>

            <label for="cnpjEmpresa">CNPJ</label>
            <input type="text" id="cnpjEmpresa" name="cnpjEmpresa" required>

            <label for="enderecoEmpresa">Endereço</label>
            <input type="text" id="enderecoEmpresa" name="enderecoEmpresa" required>

            <label for="telefoneEmpresa">Telefone</label>
            <input type="tel" id="telefoneEmpresa" name="telefoneEmpresa" required>

            <label for="emailEmpresa">E-mail</label>
            <input type="email" id="emailEmpresa" name="emailEmpresa" required>

            <br><br>
            <div class="botoes-acoes">
                <input type="button" value="Editar">
                <input type="submit" value="Gravar">
            </div>
        </form>
    </main>

    <script src="script.js"></script> 
</body>
</html>
