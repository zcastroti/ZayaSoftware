<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <a href="home.html">ZayaEdu</a>
        <input id="botao-menu" type="button" value="☰">
    </header>

    <div class="menu-lateral" id="menuLateral">
        <h2>Menu</h2>
        <ul>
            <li><a href="home.html">Início</a></li>
            <li><a href="empresa.html">Instituição</a></li>
            <li><a href="usuario.html">Usuários</a></li>
        </ul>
    </div>

    <main id="conteudoPrincipal">
        <h2>➠ Cadastro de Usuário</h2>
        <form action="#" method="post">
            <label for="nomeUsuario">Nome</label>
            <input type="text" id="nomeUsuario" name="nomeUsuario" required>

            <label for="emailUsuario">E-mail</label>
            <input type="email" id="emailUsuario" name="emailUsuario" required>

            <label for="telefoneUsuario">Telefone</label>
            <input type="tel" id="telefoneUsuario" name="telefoneUsuario" required>

            <label for="senhaUsuario">Senha</label>
            <input type="password" id="senhaUsuario" name="senhaUsuario" required>

            <br><br>
            <div class="botoes-acoes">
                <input type="button" value="Editar">
                <input type="submit" value="Cadastrar">
            </div>
        </form>
    </main>

    <script src="script.js"></script> 
</body>
</html>
